version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      vite-tooling:
        patterns:
          - "vite"
          - "vitest"
          - "vite-node"
          - "@vitejs/*"
          - "@vitest/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      supabase:
        patterns:
          - "@supabase/*"
      linting:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-*"
