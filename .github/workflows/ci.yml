name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:all --if-present

      - name: Test
        run: npm run test --if-present

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present
