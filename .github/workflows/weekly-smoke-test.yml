name: Weekly Smoke Test

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check production site
        run: |
          curl -f -L --retry 3 --retry-delay 5 --max-time 20 https://whistlekeeper.com/
